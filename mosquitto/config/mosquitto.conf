# =============================================================================
# Mosquitto Configuration — Helioponic (Docker)
# =============================================================================

# Listener for MQTT (non-TLS)
listener 1883

# Allow anonymous connections (development only)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type information
connection_messages true
log_timestamp true

# Max connections
max_connections 200

# Max QoS
max_qos 2
