# =============================================================================
# Mosquitto Configuration — Helioponic (Docker)
# =============================================================================

# Listener for MQTT (non-TLS) — bind to all interfaces for Docker networking
listener 1883 0.0.0.0

# Disallow anonymous connections — require MQTT authentication
allow_anonymous false
password_file /mosquitto/data/passwd

# Keepalive: maximum seconds between client PINGREQ messages
set_tcp_nodelay true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging — use 'all' for debugging, switch to 'information' for production
log_dest stdout
log_type all
connection_messages true
log_timestamp true

# Max connections
max_connections 200

# Max QoS
max_qos 2
